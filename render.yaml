services:
  # Python FastAPI Web Service
  - type: web
    name: behave-sec-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: behave-sec-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
        
  # PostgreSQL Database Service
  - type: psql
    name: behave-sec-db
    plan: free
